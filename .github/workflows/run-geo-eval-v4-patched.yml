name: Run GEO Evaluation v4 Patched

on:
  workflow_dispatch:
    inputs:
      brand_name:
        description: Brand name, e.g. Kioxia
        required: true
        default: Kioxia
      brand_brief:
        description: One-line brand brief
        required: true
        default: NAND flash, SSD, and enterprise storage brand
      website:
        description: Optional official website
        required: false
        default: ""
      monitor_runs:
        description: Number of DeepSeek monitoring probes, e.g. 20, 60, 120
        required: true
        default: "20"
      report_subdir:
        description: Repo path to commit generated report into
        required: true
        default: reports/latest
      deepseek_model:
        description: DeepSeek model name
        required: true
        default: deepseek-chat

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests reportlab

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Patch and validate v4 runner
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/run_geo_eval_v4_safe.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'str(len([c for c in calls if c.get("call_type")=="monitoring"))]',
              'str(len([c for c in calls if c.get("call_type")=="monitoring"]))]'
          )
          text = text.replace(
              'str(len([c for c in calls if c.get("call_type") == "monitoring"))]',
              'str(len([c for c in calls if c.get("call_type") == "monitoring"]))]'
          )
          path.write_text(text, encoding='utf-8')
          PY
          python -m py_compile scripts/run_geo_eval_v4_safe.py

      - name: Run patched full-detail GEO monitoring system
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
        run: |
          python scripts/run_geo_eval_v4_safe.py \
            --brand-name "${{ github.event.inputs.brand_name }}" \
            --brand-brief "${{ github.event.inputs.brand_brief }}" \
            --website "${{ github.event.inputs.website }}" \
            --monitor-runs "${{ github.event.inputs.monitor_runs }}" \
            --output dist/report \
            --model "${{ github.event.inputs.deepseek_model }}" \
            --repo-root . \
            --report-subdir "${{ github.event.inputs.report_subdir }}" \
            --commit-message "chore: update patched full-detail GEO monitoring dashboard" \
            --commit-report

      - name: Push report commit
        run: |
          if [ -n "$(git log --oneline origin/${GITHUB_REF_NAME}..HEAD)" ]; then
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "No new report commit to push."
          fi

      - name: Add job summary
        run: |
          echo "## Patched full-detail GEO monitoring dashboard generated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${{ github.event.inputs.report_subdir }}/summary.json" ]; then
            cat "${{ github.event.inputs.report_subdir }}/summary.json" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: geo-v4-patched-full-detail-report
          path: |
            dist/report
            ${{ github.event.inputs.report_subdir }}
