name: Run GEO Evaluation v3

on:
  workflow_dispatch:
    inputs:
      brand_name:
        description: Brand name, e.g. Kioxia
        required: true
        default: Kioxia
      brand_brief:
        description: One-line brand brief
        required: true
        default: NAND flash, SSD, and enterprise storage brand
      website:
        description: Optional official website, can be blank
        required: false
        default: ""
      report_subdir:
        description: Repo path to commit generated report into
        required: true
        default: reports/latest
      deepseek_model:
        description: DeepSeek model name
        required: true
        default: deepseek-chat

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML requests beautifulsoup4 reportlab

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run v3 GEO research pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
        run: |
          python scripts/run_geo_eval_v3.py \
            --brand-name "${{ github.event.inputs.brand_name }}" \
            --brand-brief "${{ github.event.inputs.brand_brief }}" \
            --website "${{ github.event.inputs.website }}" \
            --output dist/report \
            --model "${{ github.event.inputs.deepseek_model }}" \
            --repo-root . \
            --report-subdir "${{ github.event.inputs.report_subdir }}" \
            --commit-message "chore: update GEO v3 research dashboard" \
            --commit-report

      - name: Push report commit
        run: |
          if [ -n "$(git log --oneline origin/${GITHUB_REF_NAME}..HEAD)" ]; then
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "No new report commit to push."
          fi

      - name: Add job summary
        run: |
          echo "## GEO v3 dashboard generated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${{ github.event.inputs.report_subdir }}/summary.json" ]; then
            cat "${{ github.event.inputs.report_subdir }}/summary.json" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: geo-v3-report
          path: |
            dist/report
            ${{ github.event.inputs.report_subdir }}
