name: Run GEO Evaluation

on:
  workflow_dispatch:
    inputs:
      brand_config_path:
        description: "Path to brand config YAML"
        required: true
        default: "config/brand.yaml"
      benchmark_path:
        description: "Path to benchmark config YAML"
        required: true
        default: "config/benchmark.yaml"
      report_output_dir:
        description: "Output directory for generated report"
        required: true
        default: "dist/report"
      deepseek_model:
        description: "DeepSeek model name"
        required: true
        default: "deepseek-chat"

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
        run: |
          python scripts/run_geo_eval.py \
            --brand "${{ github.event.inputs.brand_config_path }}" \
            --benchmark "${{ github.event.inputs.benchmark_path }}" \
            --output "${{ github.event.inputs.report_output_dir }}" \
            --model "${{ github.event.inputs.deepseek_model }}"

      - name: Add job summary
        run: |
          echo "## GEO report generated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat "${{ github.event.inputs.report_output_dir }}/report.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: geo-report
          path: ${{ github.event.inputs.report_output_dir }}
